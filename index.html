<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bohnen-Bike</title>
      <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><ellipse cx='50' cy='50' rx='40' ry='25' fill='%238B4513' transform='rotate(-20 50 50)'/></svg>" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="200"></canvas>
        
        <div id="touch-controls" class="hidden">
            <div class="touch-zone">
                <div class="control-box">BREMSE</div>
            </div>
            <div class="touch-zone">
                <div class="control-box">GAS</div>
            </div>
            <div class="touch-zone">
                <div class="control-box">HINTEN</div>
            </div>
            <div class="touch-zone">
                <div class="control-box">VORN</div>
            </div>
        </div>
        <button id="headlight-btn">Licht: AUS</button>
        <button id="fullscreen-btn">Vollbild</button>
        
        
        <div id="msg-box" class="hidden"></div>
        <div id="ui-layer">
            <h1 id="title">Bohnen-Bike</h1>
            <p id="instruction">Berühre den Bildschirm oder drücke eine Taste zum Starten</p>
            
            <div id="highscore-board">
                <h3>Top 5 Fahrer</h3>
                <ul id="highscore-list">Wird geladen...</ul>
            </div>

            <div id="credits">
                <p>Bohne: kiwilu</p>
                <p>Spiel: newtown</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script src="audio.js"></script>
    <script src="physics.js"></script>
    <script src="render.js"></script>
    <script src="game.js"></script>
</body>
</html>
